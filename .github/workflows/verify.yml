name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  self-policing:
    name: stepdown-ts self-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Canonical repository gate
        run: npm run ci
